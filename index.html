<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tradutor DevClub</title> 
</head>

<body>
    <div class="caixa_maior">
        <textarea class="input-texto"></textarea>
        <div class="controle">
            <select class="idioma">
                <option value="en">Inglês</option>
                <option value="de">Alemão</option>
                <option value="ja">Japonês</option>
            </select>

            <button name="traduzir" onclick="traduzir()">
                <img src="imgs/traduzir.svg">
            </button>
            <button onclick="OuvirVoz()">    
                <img src="imgs/microfone.svg">
            </button>
        </div>

        <div class="resultado">
            <h3 class="titulo_traducao">Tradução</h3>
            <p class="traducao">A tradução aparecerá aqui...</p>
        </div>
    </div>
</body>
<script src="scripts.js"></script>
</html>
